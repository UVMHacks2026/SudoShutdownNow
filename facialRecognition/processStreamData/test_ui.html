<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Facial Recognition — Local Test</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; background: #1a1a2e; color: #eee; }
    h1 { color: #e94560; }
    .row { display: flex; gap: 20px; margin-top: 20px; }
    video { width: 100%; border-radius: 8px; background: #000; }
    .panel { background: #16213e; border-radius: 8px; padding: 16px; flex: 1; }
    .status { font-size: 13px; color: #aaa; margin-bottom: 8px; }
    .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; background: #e94560; }
    .dot.on { background: #0f3460; animation: none; }
    .dot.connected { background: #4caf50; }
    button { background: #e94560; color: #fff; border: none; border-radius: 6px; padding: 10px 18px; cursor: pointer; font-size: 14px; margin: 4px; }
    button:hover { opacity: 0.85; }
    button.secondary { background: #0f3460; }
    pre { background: #0f3460; padding: 12px; border-radius: 6px; font-size: 12px; overflow-x: auto; white-space: pre-wrap; word-break: break-word; max-height: 280px; overflow-y: auto; }
    .badge { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; }
    .badge.success { background: #4caf50; color: #fff; }
    .badge.fail { background: #e94560; color: #fff; }
    .badge.warn { background: #ff9800; color: #fff; }
    #frames { font-size: 12px; color: #888; }
  </style>
</head>
<body>
  <h1>🎥 Facial Recognition — Test UI</h1>
  <p class="status">Connects to <code>ws://localhost:8000/ws/stream</code></p>

  <div class="row">
    <div class="panel" style="flex:2">
      <div class="status">
        <span class="dot" id="dot"></span>
        <span id="ws-status">Disconnected</span>
        &nbsp;|&nbsp; <span id="frames">Frames sent: 0</span>
      </div>
      <video id="video" autoplay muted playsinline></video>
      <div style="margin-top:10px">
        <button onclick="startCamera()">📷 Start Camera</button>
        <button class="secondary" onclick="sendNow()">⚡ Verify Now</button>
        <button class="secondary" onclick="getEmployees()">👥 List Employees</button>
        <button class="secondary" onclick="getStatus()">📋 Clock Status</button>
      </div>
    </div>

    <div class="panel" style="flex:1">
      <h3 style="margin-top:0">Result</h3>
      <div id="result-badge"></div>
      <pre id="result">Waiting...</pre>
    </div>
  </div>

  <script>
    const WS_URL = 'ws://localhost:8000/ws/stream';
    let ws, stream, frameCount = 0, autoInterval = null;
    const video = document.getElementById('video');
    const canvas = document.createElement('canvas');
    canvas.width = 640; canvas.height = 480;
    const ctx = canvas.getContext('2d');

    function connect() {
      ws = new WebSocket(WS_URL);
      ws.onopen = () => setStatus(true);
      ws.onclose = () => { setStatus(false); setTimeout(connect, 2000); };
      ws.onerror = () => setStatus(false);
      ws.onmessage = (e) => {
        const data = JSON.parse(e.data);
        showResult(data);
      };
    }

    function setStatus(connected) {
      document.getElementById('ws-status').textContent = connected ? 'Connected' : 'Reconnecting...';
      const dot = document.getElementById('dot');
      dot.className = 'dot ' + (connected ? 'connected' : '');
    }

    function showResult(data) {
      document.getElementById('result').textContent = JSON.stringify(data, null, 2);
      const badge = document.getElementById('result-badge');
      if (data.type === 'clock_success') {
        badge.innerHTML = `<span class="badge success">✓ ${data.clock?.action?.toUpperCase()} — ${data.employee?.name}</span>`;
      } else if (data.type === 'recognition_failed') {
        badge.innerHTML = `<span class="badge fail">✗ Not Recognized (${(data.similarity*100).toFixed(1)}%)</span>`;
      } else if (data.type === 'error') {
        badge.innerHTML = `<span class="badge warn">⚠ ${data.message}</span>`;
      } else {
        badge.innerHTML = `<span class="badge warn">${data.type}</span>`;
      }
    }

    async function startCamera() {
      stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
      video.srcObject = stream;
      // Auto-send every 2 seconds
      if (autoInterval) clearInterval(autoInterval);
      autoInterval = setInterval(sendNow, 2000);
    }

    function captureBase64() {
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      return canvas.toDataURL('image/jpeg', 0.8);
    }

    function sendNow() {
      if (!ws || ws.readyState !== WebSocket.OPEN || !video.srcObject) return;
      ws.send(captureBase64());
      frameCount++;
      document.getElementById('frames').textContent = `Frames sent: ${frameCount}`;
    }

    function getEmployees() {
      ws?.send(JSON.stringify({ action: 'get_employees' }));
    }
    function getStatus() {
      ws?.send(JSON.stringify({ action: 'get_status' }));
    }

    connect();
  </script>
</body>
</html>
